name: CMake on multiple platforms

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    name: ${{ matrix.os }} (${{ matrix.compiler }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            compiler: clang
            c_compiler: clang
            cpp_compiler: clang++
          - os: windows-latest
            compiler: msvc
            c_compiler: cl
            cpp_compiler: cl

    steps:
    - uses: actions/checkout@v4

    # 安装依赖 (Ubuntu)
    - name: Install libcurl (Ubuntu)
      if: runner.os == 'Linux'
      run: sudo apt update && sudo apt install -y libcurl4-openssl-dev

    # Windows 下使用 vcpkg 安装静态 curl
    - name: Setup vcpkg (Windows)
      if: runner.os == 'Windows'
      uses: microsoft/setup-msvc@v2
      with:
        architecture: x64

    - name: Install curl via vcpkg (Windows)
      if: runner.os == 'Windows'
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        .\vcpkg\bootstrap-vcpkg.bat
        .\vcpkg\vcpkg install curl:x64-windows-static
        echo "VCPKG_ROOT=${{ github.workspace }}\vcpkg" >> $env:GITHUB_ENV

    - name: Set reusable strings
      id: strings
      shell: bash
      run: echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    # 配置 CMake (Ubuntu)
    - name: Configure CMake (Ubuntu)
      if: runner.os == 'Linux'
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=Release
        -DCURL_STATICLIB=ON
        -S ${{ github.workspace }}

    # 配置 CMake (Windows)
    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=Release
        -DCURL_STATICLIB=ON
        -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
        -S ${{ github.workspace }}

    # 构建
    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config Release

    # 验证可执行文件存在
    - name: Verify executable
      shell: bash
      run: |
        if [[ "${{ runner.os }}" == "Windows" ]]; then
          EXE="${{ steps.strings.outputs.build-output-dir }}/Release/Simple_ID_Lottery.exe"
        else
          EXE="${{ steps.strings.outputs.build-output-dir }}/Simple_ID_Lottery"
        fi
        test -f "$EXE" && echo "Executable exists: $EXE"
