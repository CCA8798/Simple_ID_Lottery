name: CMake on multiple platforms

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            vcpkg_triplet: x64-windows-static
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@v4

    # ---------- 安装依赖 ----------
    - name: Install libcurl (Ubuntu)
      if: runner.os == 'Linux'
      run: sudo apt update && sudo apt install -y libcurl4-openssl-dev

    - name: Setup vcpkg (Windows)
      if: runner.os == 'Windows'
      uses: microsoft/setup-msvc@v2  # 确保 MSVC 环境
      with:
        architecture: x64

    - name: Install libcurl via vcpkg (Windows)
      if: runner.os == 'Windows'
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        .\vcpkg\bootstrap-vcpkg.bat
        .\vcpkg\vcpkg install curl:${{ matrix.vcpkg_triplet }}
        echo "VCPKG_ROOT=${{ github.workspace }}\vcpkg" >> $env:GITHUB_ENV

    # ---------- 设置输出目录 ----------
    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    # ---------- 配置 CMake ----------
    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DCURL_STATICLIB=ON
        -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
        -S ${{ github.workspace }}

    - name: Configure CMake (Ubuntu)
      if: runner.os == 'Linux'
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DCURL_STATICLIB=ON
        -S ${{ github.workspace }}

    # ---------- 构建 ----------
    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    # ---------- 简单验证（程序为交互式，仅检查可执行文件存在） ----------
    - name: Verify executable exists
      shell: bash
      run: |
        if [[ "${{ runner.os }}" == "Windows" ]]; then
          EXE="${{ steps.strings.outputs.build-output-dir }}/${{ matrix.build_type }}/Simple_ID_Lottery.exe"
        else
          EXE="${{ steps.strings.outputs.build-output-dir }}/Simple_ID_Lottery"
        fi
        test -f "$EXE" && echo "Executable found: $EXE"
